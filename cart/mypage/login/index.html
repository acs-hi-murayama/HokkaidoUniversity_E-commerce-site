<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<!-- ============================================================
     本番: https://cart.raku-uru.jp/mypage/login/{shpHash}  (画面ID MYP0001D01)
     本番の生HTMLを忠実に再現。CSS(cart-common.css + getCssテーマ)・
     テキスト・構造・入力項目は本番と同一。フォーム送信のみローカル挙動。
     ============================================================ -->
<head>
<title>マイページログイン | 北大オリジナルグッズ</title>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width">
<meta name="format-detection" content="telephone=no">
<link rel="shortcut icon" href="https://contents.raku-uru.jp/01/14604/189/favicon.ico">
<link rel="icon" type="image/vnd.microsoft.icon" href="https://contents.raku-uru.jp/01/14604/189/favicon.ico">
<link href="/cart/assets/cart-common.css" rel="stylesheet">
<link href="/cart/assets/theme.css" rel="stylesheet">
<style>
.btn-pagetop.is-show { z-index: 101; opacity: 1; }
</style>
</head>

<body id="MYP0001D01">
	<div class="overlay"></div>
	<div id="wrapper">
			<div class="header">
				<div class="header-top-cart clearfix">
					<div class="row">
						<div class="logo">
							<h1>
								<a href="/">
									<p class="logo-text">北大オリジナルグッズ</p>
								</a>
							</h1>
						</div>
					</div>
				</div>
			</div>

		<div class="contents clearfix">
			<div class="bread">
				<ul>
					<li><a href="/">HOME</a></li>
					<li><span>マイページログイン</span></li>
				</ul>
			</div>
			<div class="main main-1col clearfix ">
				<div class="ttl">
					<h2>MY PAGE</h2>
					<h3>マイページ</h3>
				</div>

				<form action="/mypage/login" method="post" id="myp0001d01Form">
					<div class="cart-1col">
						<div class="cart-1col-inner">
							<h4>マイページログイン</h4>
							<div class="cart-mypage-login-msg">
								<p>会員の方はIDとパスワードを入力してログインしてください。
								</p>
							</div>
							<table>
								<tr class="cart-input-member-id">
									<th>会員ID</th>
									<td>
										<input type="text" maxlength="128" style="ime-mode:disabled" placeholder="" id="loginId" name="loginId" value="">
									</td>
								</tr>
								<tr class="cart-input-member-pw">
									<th>会員パスワード</th>
									<td>
										<div>
											<input type="password" maxlength="20" style="ime-mode:disabled" placeholder="" id="loginPassword" name="loginPassword" value="">
										</div>
										<div class="form-checkbox">
											<input type="checkbox" name="forgetpw" id="forgetpw">
											<label for="forgetpw">パスワードを表示する</label>
										</div>
									</td>
								</tr>
							</table>
						</div>
						<div class="cart-1col-btn"><a href="#" class="btn postOnClick"><span>ログイン</span></a></div>
						<div class="cart-1col-inner">
							<div class="cart-mypage-login-link">
								<ul>
									<li><a href="#" id="forgot-link">パスワードを忘れた場合</a></li>
									<li><a href="/cart/member/regist/input/">新規会員登録はこちら</a></li>
								</ul>
							</div>
						</div>
					</div>
					<input type="hidden" id="shpHash" name="shpHash" value="47409ca9deadd2be6543f3c2fc49d40f" />
				</form>
			</div>
		</div>

		<div id="footer">
			<div class="btn-pagetop"><a href="#wrapper"></a></div>
			<div class="footer-top">
				<div class="row clearfix">
					<div class="footer-top-cart">
						<div class="footer-logo">
							<div class="logo-text logo-text-footer">北大オリジナルグッズ</div>
						</div>
					</div>
				</div>
			</div>
			<div class="footer-bottom">
				<div class="row clearfix">
					<p class="copyright">Copyright © 北大オリジナルグッズ All Rights Reserved.</p>
				</div>
			</div>
		</div>
		<!-- footer -->

	</div>
	<div class="btn-pagetop">
		<a href="#wrapper"></a>
	</div>

	<script src="https://code.jquery.com/jquery-1.12.4.min.js" type="text/javascript"></script>
	<script src="/cart/assets/cart-app.js"></script>
	<script>
	(function () {
		var form = document.getElementById("myp0001d01Form");
		$("#forgetpw").on("change", function () {
			$("#loginPassword").attr("type", this.checked ? "text" : "password");
		});
		$("#forgot-link").on("click", function (e) { e.preventDefault(); alert("【ローカルデモ】パスワード再設定画面へ遷移します（本番環境の機能）。"); });

		if (TX.isLoggedIn()) { location.replace("/cart/mypage/"); return; }
		function qs(n) { try { return new URLSearchParams(location.search).get(n); } catch (e) { return null; } }

		function doLogin(e) {
			if (e) e.preventDefault();
			var id = ($("#loginId").val() || "").trim();
			var pw = ($("#loginPassword").val() || "").trim();
			if (!id || !pw) { alert("会員IDとパスワードを入力してください。"); return; }
			if (!TX.getMember()) { alert("登録済みの会員が見つかりません。先に会員登録を行ってください。"); return; }
			if (TX.login(id, pw)) {
				location.href = qs("return") === "checkout" ? "/cart/cart/" : "/cart/mypage/";
			} else { alert("会員IDまたはパスワードが正しくありません。"); }
		}
		$(".postOnClick").on("click", doLogin);
		$(form).on("submit", doLogin);
	})();
	</script>
</body>
</html>
