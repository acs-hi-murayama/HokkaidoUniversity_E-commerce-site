<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<!-- ============================================================
     本番: https://cart.raku-uru.jp/member/regist/confirm/{shpHash} (画面ID MEM0001D02)
     ※本番はPOST遷移のため生HTML取得不可。入力ページと同一の chrome/CSS/
       クラス体系（cart-1col / cart-input-user）で確認画面を構成。
     ============================================================ -->
<head>
<title>会員登録 | 北大オリジナルグッズ</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<meta name="format-detection" content="telephone=no">
<link rel="shortcut icon" href="https://contents.raku-uru.jp/01/14604/189/favicon.ico">
<link href="/cart/assets/cart-common.css" rel="stylesheet">
<link href="/cart/assets/theme.css" rel="stylesheet">
<style>.btn-pagetop.is-show { z-index: 101; opacity: 1; }</style>
</head>

<body id="MEM0001D02">
	<div class="overlay"></div>
	<div id="wrapper">
			<div class="header">
				<div class="header-top-cart clearfix">
					<div class="row">
						<div class="logo"><h1><a href="/"><p class="logo-text">北大オリジナルグッズ</p></a></h1></div>
					</div>
				</div>
			</div>

		<div class="contents">
			<div class="bread">
				<ul>
					<li><a href="/">HOME</a></li>
					<li><span>会員登録</span></li>
				</ul>
			</div>
			<div class="main main-1col">
				<div class="ttl"><h2>REGISTRATION</h2><h3>会員登録</h3></div>

				<div class="cart-1col">
					<div class="cart-input-user">
						<h4>会員登録情報確認</h4>
						<div class="cart-mypage-login-msg"><p>ご入力内容をご確認のうえ、「登録する」ボタンを押してください。</p></div>
						<table id="conf-tbl"></table>
					</div>
					<div class="cart-1col-btn">
						<a href="/cart/member/regist/input/" class="btn"><span>修正する</span></a>
						<a href="#" class="btn postOnClick" id="js-regist"><span>登録する</span></a>
					</div>
				</div>
			</div>
		</div>

		<div id="footer">
			<div class="btn-pagetop"><a href="#wrapper"></a></div>
			<div class="footer-top"><div class="row clearfix"><div class="footer-top-cart"><div class="footer-logo"><div class="logo-text logo-text-footer">北大オリジナルグッズ</div></div></div></div></div>
			<div class="footer-bottom"><div class="row clearfix"><p class="copyright">Copyright © 北大オリジナルグッズ All Rights Reserved.</p></div></div>
		</div>
		<!-- footer -->
	</div>
	<div class="btn-pagetop"><a href="#wrapper"></a></div>

	<script src="https://code.jquery.com/jquery-1.12.4.min.js" type="text/javascript"></script>
	<script src="/cart/assets/cart-app.js"></script>
	<script>
	(function () {
		var d = TX.getRegTmp();
		if (!d) { location.replace("/cart/member/regist/input/"); return; }
		var rows = [
			["会員ID", d.loginId],
			["会員パスワード", "●●●●●●●●"],
			["氏名", d.lastName + " " + d.firstName],
			["氏名フリガナ", d.lastNameKana + " " + d.firstNameKana],
			["郵便番号", d.postNo],
			["都道府県", d.kenName],
			["市区町村", d.city],
			["町域・番地", d.houseNo],
			["ビル・マンション名", d.building || "―"],
			["メールアドレス", d.mailadd],
			["電話番号", d.tel],
			["携帯電話番号", d.cellularphone || "―"],
			["FAX番号", d.fax || "―"],
			["性別", d.genderName || "―"],
			["生年月日", d.birthYear + "年" + d.birthMonth + "月" + d.birthDay + "日"],
			["年齢", d.free1Field],
			["メルマガ配信希望", d.optinFlag === "1" ? "希望する" : "希望しない"]
		];
		document.getElementById("conf-tbl").innerHTML = rows.map(function (r) {
			return '<tr><th>' + TX.esc(r[0]) + '</th><td>' + TX.esc(r[1]) + '</td></tr>';
		}).join("");

		$("#js-regist").on("click", function (e) {
			e.preventDefault();
			TX.saveMember({
				memberId: d.loginId, password: d.loginPassword,
				loginId: d.loginId,
				lastName: d.lastName, firstName: d.firstName, lastNameKana: d.lastNameKana, firstNameKana: d.firstNameKana,
				postNo: d.postNo, kenId: d.kenId, kenName: d.kenName, city: d.city, houseNo: d.houseNo, building: d.building,
				mailadd: d.mailadd, tel: d.tel, cellularphone: d.cellularphone, fax: d.fax,
				gender: d.gender, genderName: d.genderName,
				birthYear: d.birthYear, birthMonth: d.birthMonth, birthDay: d.birthDay,
				free1Field: d.free1Field, optinFlag: d.optinFlag, registeredAt: TX.todayStr()
			});
			TX.clearRegTmp();
			location.href = "/cart/member/regist/complete/";
		});
	})();
	</script>
</body>
</html>
